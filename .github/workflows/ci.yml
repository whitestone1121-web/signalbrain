name: Public CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read

jobs:
  package-tests:
    name: tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: ubuntu-latest
            python-version: "3.14"
          - os: windows-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.14"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest
      - name: Run tests
        run: python -m pytest tests/ -q
      - name: CLI smoke
        run: |
          python -m signalbrain.cli --help
          python -c "import subprocess, sys; p = subprocess.run([sys.executable, '-m', 'signalbrain.cli', 'gate', '--ledger', 'does-not-exist.jsonl', '--by-class']); raise SystemExit(0 if p.returncode == 1 else p.returncode)"

  mcp-tests:
    name: MCP tests (ubuntu, py3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install MCP extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[mcp]" pytest
      - name: Run MCP package tests
        run: python -m pytest tests/package/test_mcp_server.py -q

  build:
    name: package build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Build and inspect package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
